type: dagster_sling.SlingReplicationCollectionComponent

requirements:
  env:
    - POSTGRES_HOST
    - POSTGRES_PORT
    - POSTGRES_USER
    - POSTGRES_PASSWORD
    - POSTGRES_DATABASE
    - POSTGRES_SCHEMA
    - SNOWFLAKE_ACCOUNT
    - SNOWFLAKE_USER
    - SNOWFLAKE_PASSWORD
    - SNOWFLAKE_DATABASE
    - SNOWFLAKE_SCHEMA
    - SNOWFLAKE_WAREHOUSE
    - SNOWFLAKE_ROLE

attributes:
  replications:
    - path: replication.yaml
  
  connections:
    postgres_source:
      type: postgres
      host: $POSTGRES_HOST
      port: $POSTGRES_PORT
      user: $POSTGRES_USER
      password: $POSTGRES_PASSWORD
      database: $POSTGRES_DATABASE
      schema: $POSTGRES_SCHEMA
    
    snowflake_target:
      type: snowflake
      account: $SNOWFLAKE_ACCOUNT
      user: $SNOWFLAKE_USER
      password: $SNOWFLAKE_PASSWORD
      database: $SNOWFLAKE_DATABASE
      schema: $SNOWFLAKE_SCHEMA
      warehouse: $SNOWFLAKE_WAREHOUSE
      role: $SNOWFLAKE_ROLE
