type: dagster_sling.SlingReplicationCollectionComponent

attributes:
  connections:
    postgres_source:
      type: postgres
      connection_string: "${POSTGRES_CONNECTION_STRING}"
    snowflake_target:
      type: snowflake
      host: "${SNOWFLAKE_HOST}"
      user: "${SNOWFLAKE_USER}"
      password: "${SNOWFLAKE_PASSWORD}"
      database: "${SNOWFLAKE_DATABASE}"
      warehouse: "${SNOWFLAKE_WAREHOUSE}"
      role: "${SNOWFLAKE_ROLE}"
  replications:
    - path: replication.yaml

requirements:
  env:
    - POSTGRES_CONNECTION_STRING
    - SNOWFLAKE_HOST
    - SNOWFLAKE_USER
    - SNOWFLAKE_PASSWORD
    - SNOWFLAKE_DATABASE
    - SNOWFLAKE_WAREHOUSE
    - SNOWFLAKE_ROLE
